services:
  - type: web
    name: rsvp-casamento-backend
    runtime: node
    plan: free
    buildCommand: npm install --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: rsvp_casamento
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOW_RSVP_UPDATES
        value: "false"
